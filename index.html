<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="UTF-8">
    <title>妇女节祝福</title>
    <style>
        /* 字体未加载完成时隐藏文字，避免闪烁模糊 */
        .greeting-text {
            visibility: hidden;
        }
        /* 字体加载完成后显示 */
        .fonts-loaded .greeting-text {
            visibility: visible;
        }

        /* 全局盒子模型设置 */
        *, *::before, *::after {
            box-sizing: border-box;
        }

        /* 新增：重置html标签，解决全屏适配问题 */
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', 'Hiragino Sans GB', 'Heiti SC', 'WenQuanYi Micro Hei', sans-serif;
            text-align: center;
            /*background-color: #fff5f7;*/
            /*padding: 50px;*/
            /*margin: 0;*/
            /* 核心修改：背景图片 */
            background-image: url('picture/seaOfFlowers.jpg');

            /* 调整背景 */
            background-size: cover;       /* 图片铺满整个屏幕，不变形 */
            background-position: center;  /* 图片居中显示 */
            background-repeat: no-repeat; /* 图片不重复 */
            background-attachment: fixed; /* 页面滚动时背景固定不动（高级感） */

            /* 保留一点粉色作为 fallback（防止图片加载失败） */
            background-color: #fff5f7;

            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
            position: relative;
            box-sizing: border-box;
        }

        /* 给 body 加一个半透明粉色遮罩层，让文字更清晰 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 245, 247, 0.5); /* 0.5 是透明度，0-1之间可调 */
            z-index: -1; /* 把遮罩放在最下面 */
        }

        /* ==================== 祝福卡片样式 ==================== */
        /*祝福卡片区域*/
        .card {
            background: white; /* 白色背景 */
            z-index: 200;
            padding: 40px; /* 内边距40px */
            border-radius: 20px; /* 圆角20像素 */
            box-shadow: 0 10px 30px rgba(255, 182, 193, 0.3); /* 粉色阴影 */
            display: inline-block; /* 宽度自适应内容 */
            margin-top: 20px; /* 上边距20px */
        }

        h1 {
            color: #e9546b; /* 设置卡片标题为深粉色 */
        }

        p {
            color: indigo;
        }

        /* 按钮默认状态 */
        button {
            background-color: #ff9eb5; /* 按钮背景色 */
            color: white; /* 文字颜色 */
            border: none; /* 去掉边框 */
            padding: 15px 30px; /* 内边距：上下15px，左右30px */
            font-size: 18px; /* 文字大小 */
            border-radius: 50px; /* 圆形按钮 */
            cursor: pointer; /* 鼠标变手型 */
            margin: 20px; /* 外边距 */
        }

        /* 鼠标悬停在按钮时的按钮样式 */
        button:hover {
            background-color: #e9546b; /* 悬停时变深粉色 */
            transform: scale(1.1); /* 悬停时放大 */
        }

        /* 隐藏的祝福区域 */
        #surprise {
            display: none; /* 初始状态隐藏此元素 */
            margin-top: 30px; /* 当显示时，顶部与上方元素保持距离 */
            font-size: 20px; /* 设置文字大小 */
            color: #666; /* 设置文字颜色为深灰色 */
        }

        /* 心形图标 */
        .heart {
            color: red;
            font-size: 24px; /* 心形大小 */
            animation: beat 1s infinite; /* 应用心跳动画：名称beat 1秒无限循环 */
        }

        /* 定义名为"beat"的动画 */
        @keyframes beat {
            /* 开始和结束：原始大小 */
            0%, 100% {
                transform: scale(1);
            } 50% {
                transform: scale(1.5); /* 中间：放大1.5倍 */
            }
        }

        /* ==================== 音乐播放器样式 ==================== */
        /* 音乐播放器卡片样式 */
        .music-player-card {
            position: fixed;  /* 固定在页面左上角 */
            top: 20px;
            left: 20px;
            width: 240px;  /* 卡片宽度240像素 */
            max-height: 90vh; /* 最大高度 90%视口高度 */
            background: white;
            border-radius: 15px; /* 15像素圆角，柔和边缘 */
            box-shadow: 0 8px 20px rgba(233, 84, 107, 0.2); /* 粉色阴影 */
            padding: 15px;  /* 内边距15像素，确保内容不紧贴边缘 */
            z-index: 100;
            transition: all 0.3s ease; /* 所有属性变化都添加0.3秒的平滑过渡效果 */
            border: 2px solid rgba(255, 158, 181, 0.3); /* 粉色边框，半透明效果 */
            overflow-y: auto; /* 允许滚动 */
        }

        /* 鼠标悬停在卡片上时的交互效果 */
        .music-player-card:hover {
            transform: translateY(-5px); /* 上移5像素，创造悬浮感 */
            box-shadow: 0 12px 25px rgba(233, 84, 107, 0.3); /* 加深阴影，增强立体感 */
        }

        /* 音乐播放器标题区域样式 */
        .music-header {
            display: flex; /* 弹性布局，方便对齐子元素 */
            align-items: center; /* 垂直居中对齐 */
            margin-bottom: 10px; /* 底部外边距10像素，与下方内容分隔 */
        }

        /* 音乐图标样式 */
        .music-icon {
            width: 30px; /* 图标容器宽度30像素 */
            height: 30px; /* 图标容器高度30像素 */
            background: linear-gradient(135deg, #e9546b, #ff9eb5); /* 粉色渐变背景 */
            border-radius: 8px; /* 8像素圆角，略微圆润 */
            display: flex; /* 弹性布局 */
            align-items: center; /* 垂直居中图标 */
            justify-content: center; /* 水平居中图标 */
            color: white; /* 图标颜色为白色 */
            font-size: 16px; /* 图标大小16像素 */
            margin-right: 8px; /* 右侧外边距8像素，与标题保持距离 */
        }

        /* 音乐播放器标题文字样式 */
        .music-title {
            font-size: 12px; /* 字体大小12像素，适合小尺寸卡片 */
            color: #e9546b; /* 粉色文字，与整体主题协调 */
            font-weight: bold; /* 加粗字体，突出标题 */
        }

        /* 播放器控制按钮容器样式 */
        .player-controls {
            display: flex; /* 弹性布局，便于按钮排列 */
            justify-content: space-between; /* 按钮在容器中均匀分布 */
            align-items: center; /* 垂直居中对齐 */
            margin-bottom: 8px; /* 底部外边距8像素，与下方内容分隔 */
        }

        /* 通用播放器按钮样式 */
        .player-btn {
            background: none; /* 透明背景 */
            border: none; /* 无边框 */
            color: #e9546b; /* 粉色图标，与主题一致 */
            cursor: pointer; /* 鼠标指针变为手形，表示可点击 */
            font-size: 14px; /* 图标大小14像素 */
            padding: 5px; /* 内边距5像素，增加点击区域 */
            border-radius: 50%; /* 圆形按钮 */
            width: 30px; /* 固定宽度30像素 */
            height: 30px; /* 固定高度30像素，保持为圆形 */
            display: flex; /* 使用弹性布局 */
            align-items: center; /* 垂直居中图标 */
            justify-content: center; /* 水平居中图标 */
            transition: all 0.3s ease; /* 所有属性变化都添加0.3秒的平滑过渡效果 */
        }

        /* 鼠标悬停在按钮上时的效果 */
        .player-btn:hover {
            background: rgba(84, 233, 127, 0.5); /* 半透明淡薄荷绿背景，保留0.5的透明度 */
        }

        /* 特殊样式：播放/暂停按钮 */
        .play-btn {
            background: linear-gradient(135deg, #e9546b, #ff9eb5); /* 粉色渐变背景，突出显示 */
            color: white; /* 白色图标，与背景形成对比 */
            font-size: 16px; /* 稍大的图标，更易点击 */
        }

        /* 播放/暂停按钮悬停效果 */
        .play-btn:hover {
            transform: scale(1.1); /* 放大10%，增强交互反馈 */
        }

        /* 歌曲信息区域样式 */
        .music-info {
            font-size: 10px; /* 较小的字体大小（10像素），适合小卡片 */
            color: #666; /* 深灰色文字，次要信息 */
            margin-top: 8px; /* 顶部外边距8像素，与控制按钮分隔 */
            white-space: nowrap; /* 不换行，保持一行显示 */
            overflow: hidden; /* 超出部分隐藏 */
            text-overflow: ellipsis; /* 超出部分显示为省略号 */
        }

        /* 歌曲标题样式 */
        .song-title {
            color: #333; /* 深黑色文字，突出显示 */
            font-weight: bold; /* 加粗字体 */
            margin-bottom: 2px; /* 底部外边距2像素，与艺术家信息分隔 */
        }

        /* 播放列表下拉按钮样式 */
        .playlist-toggle {
            display: block; /* 块级显示，占满整行 */
            width: 80%; /* 宽度占容器80% */
            background: rgba(233, 84, 107, 0.1); /* 浅粉色半透明背景 */
            border: none; /* 无边框 */
            color: #e9546b; /* 粉色文字 */
            padding: 6px; /* 内边距6像素 */
            border-radius: 10px; /* 10像素圆角 */
            font-size: 10px; /* 字体大小10像素 */
            cursor: pointer; /* 鼠标指针变为手形，表示可点击 */
            margin-top: 8px; /* 顶部外边距8像素，与上方内容分隔 */
            align-items: center; /* 垂直居中图标 */
            justify-content: center; /* 水平居中图标 */
            transition: all 0.3s ease; /* 所有属性变化都添加0.3秒的平滑过渡效果 */
        }

        /* 播放列表下拉按钮悬停效果 */
        .playlist-toggle:hover {
            background: rgba(233, 84, 107, 0.2); /* 悬停时加深背景颜色，增强交互反馈 */
        }

        /* 播放列表容器样式（默认隐藏） */
        .playlist {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease; /* 稍微放慢动画，更优雅 */
            margin-top: 8px;
            padding-right: 4px; /* 为滚动条预留一点空间 */
        }

        /* 播放列表显示时的样式 */
        .playlist.show {
            max-height: 280px; /* 设定一个舒适的高度，大约能显示8-9首歌 */
            overflow-y: auto; /* 核心：允许垂直滚动 */
            overflow-x: hidden; /* 禁止横向滚动 */
            /* Firefox 兼容 */
            scrollbar-width: thin;
            scrollbar-color: rgba(233, 84, 107, 0.3) transparent; /* 滑块颜色 轨道颜色 */
        }

        /* ==================== 自定义滚动条美化 ==================== */
        /* 1. 滚动条整体轨道 */
        .playlist::-webkit-scrollbar {
            width: 6px; /* 滚动条默认宽度：细窄不突兀 */
        }

        /* 2. 滚动条轨道背景 */
        .playlist::-webkit-scrollbar-track {
            background: rgba(233, 84, 107, 0.05); /* 极淡的粉色背景 */
            border-radius: 3px;
        }

        /* 3. 滚动条滑块 */
        .playlist::-webkit-scrollbar-thumb {
            background: rgba(233, 84, 107, 0.3); /* 半透明粉色滑块 */
            border-radius: 3px;
            transition: background 0.3s ease;
        }

        /* 4. 鼠标悬停在播放列表上时的滑块样式 */
        .playlist:hover::-webkit-scrollbar-thumb {
            background: rgba(233, 84, 107, 0.6); /* 悬停时变深，方便拖动 */
        }

        /* 5. 鼠标悬停在滑块上时 */
        .playlist::-webkit-scrollbar-thumb:hover {
            background: #e9546b; /* 完全实心主题色 */
            width: 8px; /* 稍微变宽 */
        }

        /* 播放列表项样式 */
        .playlist-item {
            padding: 6px 8px;
            border-radius: 8px;
            margin-bottom: 4px;
            cursor: pointer;
            font-size: 10px;
            background: rgba(245, 245, 245, 0.5);
            transition: all 0.3s ease;
            display: flex; /* 使用flex布局 */
            justify-content: space-between; /* 标题靠左，时长靠右 */
            align-items: center;
        }

        /* 播放列表项悬停效果 */
        .playlist-item:hover {
            background: rgba(233, 84, 107, 0.1); /* 悬停时变为粉色半透明背景 */
        }

        /* 当前播放的歌曲项激活样式 */
        .playlist-item.active {
            background: rgba(233, 84, 107, 0.15); /* 比悬停更深的粉色背景 */
            border-left: 3px solid #e9546b; /* 左侧粉色边框，突出显示当前播放 */
        }

        /* 播放列表项中歌曲标题样式 */
        .playlist-item .item-title {
            font-weight: bold; /* 加粗字体 */
            color: #333; /* 深黑色文字 */
        }

        /* 播放列表项中歌曲时长样式 */
        .playlist-item .item-duration {
            font-size: 8px; /* 更小的字体大小（8像素） */
            color: #888; /* 浅灰色，次要信息 */
            float: right; /* 右浮动，与标题右对齐 */
        }

        /* 音乐播放器进度条样式 */
        /* 时间显示区域 */
        .time-display {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: #666;
            margin: 8px 0 4px;
            padding: 0 2px;
        }

        /* 进度条主容器 */
        .progress-container {
            position: relative;
            width: 100%;
            height: 6px;
            background: rgba(233, 84, 107, 0.1);
            border-radius: 3px;
            cursor: pointer;
            margin-bottom: 10px;
            transition: height 0.2s ease;
        }

        /* 鼠标悬停时进度条变粗，增强交互感 */
        .progress-container:hover {
            height: 8px;
        }

        /* 缓冲进度条 */
        .progress-buffer {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: rgba(233, 84, 107, 0.2);
            border-radius: 3px;
            width: 0%;
            transition: width 0.3s ease;
        }

        /* 已播放进度条 */
        .progress-played {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: linear-gradient(90deg, #ff9eb5, #e9546b);
            border-radius: 3px;
            width: 0%;
            transition: width 0.1s linear;
        }

        /* 进度拖拽圆点 */
        .progress-dot {
            position: absolute;
            top: 50%;
            left: 0%;
            transform: translate(-50%, -50%);
            width: 12px;
            height: 12px;
            background: white;
            border: 2px solid #e9546b;
            border-radius: 50%;
            cursor: grab;
            opacity: 0;
            transition: all 0.2s ease;
            box-shadow: 0 2px 4px rgba(233, 84, 107, 0.3);
        }

        /* 鼠标悬停进度条时显示圆点 */
        .progress-container:hover .progress-dot {
            opacity: 1;
        }

        /* 拖拽时圆点样式 */
        .progress-dot:active {
            cursor: grabbing;
            transform: translate(-50%, -50%) scale(1.2);
        }

        /* 悬停时间提示气泡 */
        .progress-tooltip {
            position: absolute;
            top: -30px;
            transform: translateX(-50%);
            background: #e9546b;
            color: white;
            font-size: 10px;
            padding: 4px 6px;
            border-radius: 4px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            white-space: nowrap;
        }

        /* 鼠标悬停时显示气泡 */
        .progress-container:hover .progress-tooltip {
            opacity: 1;
        }

        /* ==================== 相册相关样式 ==================== */
        /* 相册容器样式 - 全屏显示相册页面 */
        .album-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 245, 247, 0.95);
            z-index: 300;
            display: none;
            overflow-y: auto;
            padding: 20px;
        }

        /* 相册容器激活状态 - 显示相册 */
        .album-container.active {
            display: block;
        }

        /* 相册头部样式 */
        .album-header {
            margin: 20px 0 40px;
        }

        /* 相册标题样式 */
        .album-title {
            color: #e9546b;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        /* 相册副标题样式 */
        .album-subtitle {
            color: #666;
            font-size: 1.2rem;
        }

        /* 相册网格布局 - 使用CSS Grid实现响应式布局 */
        .album-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 相册项样式 - 每张照片的容器 */
        .album-item {
            position: relative;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            cursor: pointer;
            aspect-ratio: 1 / 1; /* 使用宽高比替代固定高度 */
        }

        /* 相册项悬停效果 */
        .album-item:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(233, 84, 107, 0.2);
        }

        /* 相册项中的图片样式 */
        .album-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        /* 相册项悬停时图片放大 */
        .album-item:hover img {
            transform: scale(1.05); /* 放大5% */
        }

        /* 相册项标题区域 - 默认隐藏，悬停时显示 */
        .album-caption {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
            color: white;
            padding: 20px;
            transform: translateY(100%);
            transition: transform 0.3s ease;
        }

        /* 相册项悬停时显示标题 */
        .album-item:hover .album-caption {
            transform: translateY(0);
        }

        /* 相册标题样式 */
        .album-caption h3 {
            margin: 0 0 5px 0;
            font-size: 1.2rem;
        }

        /* 相册描述样式 */
        .album-caption p {
            color: #ff69b4;
            margin: 0;
            font-size: 0.9rem;
            opacity: 0.9;
            text-shadow: 0 0 8px rgba(255, 105, 180, 0.8);
        }

        /* 相册查看器模态框 - 全屏图片查看器 */
        .album-viewer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 400;
            display: none;
            justify-content: center;
            align-items: center;
        }

        /* 相册查看器激活状态 - 显示查看器 */
        .album-viewer.active {
            display: flex; /* 使用flex布局显示 */
        }

        /* 查看器内容区域 */
        .viewer-content {
            position: relative;
            max-width: 90%;
            max-height: 90%;
        }

        /* 查看器中的图片样式 */
        .viewer-content img {
            max-width: 100%;
            max-height: 80vh;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
        }

        /* 查看器中的图片文字描述样式 */
        #viewerDesc {
            color: #ff69b4;
            font-weight: 600;
            font-size: 1.2rem;
            /* 粉色外发光，和页面特效统一 */
            text-shadow: 0 0 8px rgba(255, 105, 180, 0.8);
        }

        /* 查看器图片标题区域 */
        .viewer-caption {
            position: absolute;
            bottom: -50px;
            left: 0;
            right: 0;
            text-align: center;
            color: white;
            padding: 10px;
        }

        /* 查看器关闭按钮 */
        .viewer-close {
            position: absolute;
            top: -40px;
            right: 0;
            background: none;
            border: none;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            width: 40px;
            height: 40px;
        }

        /* 查看器导航按钮（上一张/下一张） */
        .viewer-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
        }

            box-shadow:
                0 0 6px currentColor,

        /**

         * @param {number} seconds - 总秒数
         * @returns {string} 格式化后的时间字符串
         */
        function formatTime(seconds) {
            if (isNaN(seconds) || seconds < 0) return "00:00";
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            // 补零，确保两位数
            return `${mins.toString().padStart(2, "0")}:${secs.toString().padStart(2, "0")}`;
        }

                            case 'Escape': closeViewer(); break;

        function logout() {
            // 显示确认对话框

                return;

            console.log("开始退出登录流程...");

                return response.json();
            })
            .catch(err => {
                console.log("后端登出接口调用失败，不影响前端登出:", err);

        function playSound(audioElement, volume = 1) {
            if (!audioElement) {

            // 核心：深度克隆音频节点
            // 这样每一朵烟花都有一个独立的音频播放器，不会互相切断
            const soundClone = audioElement.cloneNode(true);

            // 设置音量（可以稍微降低一点，因为多个音轨叠加会变响）

            // 播放克隆出来的副本

                console.log("音效播放受限（需用户交互）:", err);
            });

            // 播放完后自动清理（4秒后）

            setTimeout(() => {
                soundClone.pause();
                soundClone.src = '';
                soundClone.remove();
            }, 4500); // 音效时长+一点缓冲，4秒的音效填4500
        }

        // 启动烟花

        // 核心：创建带升空效果的烟花
        function createRocketFirework(type = 'circle') {
            if (!fireworksContainer) {
                return;
            }

            // 随机升空位置和目标高度
            const startX = Math.random() * window.innerWidth;

            // ==================== 大幅调高：飞到屏幕最顶部 ====================
            // 目标高度：屏幕高度的 5%-15% 区域（几乎贴着天花板）
            const targetY = window.innerHeight * (0.75 + Math.random() * 0.4);

            const color = FIREWORK_COLORS[Math.floor(Math.random() * FIREWORK_COLORS.length)];

            // 创建升空拖尾
            const trail = document.createElement('div');
            trail.className = 'firework-trail';
            trail.style.left = startX + 'px';
            trail.style.bottom = '0';
            trail.style.color = color;
            trail.style.setProperty('--targetY', -targetY + 'px');
            fireworksContainer.appendChild(trail);

            // 升空完成后爆炸
            setTimeout(() => {
                trail.remove();
                // 在升空的终点爆炸
                createFirework(startX, window.innerHeight - targetY, type, color);
            }, 800);
        }

        // 爆炸核心函数
        function createFirework(x, y, type = 'circle', color) {
            if (!fireworksContainer) {
                return;
            }

            const particles = type === 'heart' ? 80 : 100;
            const mainColor = color || FIREWORK_COLORS[Math.floor(Math.random() * FIREWORK_COLORS.length)];
            const gravity = 180; // 重力下落值，更真实

            for (let i = 0; i < particles; i++) {
                const particle = document.createElement('div');
                particle.className = 'firework';
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';

                // 随机配色（同色系渐变）
                const particleColor = Math.random() > 0.3 ? mainColor : FIREWORK_COLORS[Math.floor(Math.random() * FIREWORK_COLORS.length)];
                particle.style.color = particleColor;
                particle.style.background = particleColor;

                // 不同烟花类型的轨迹计算
                let angle, velocity, tx, ty;
                const baseVelocity = 40 + Math.random() * 120;

                if (type === 'heart') {
                    // 心形烟花轨迹
                    angle = (Math.PI * 2 * i) / particles;
                    const t = angle;
                    // 心形参数方程
                    const heartX = 16 * Math.pow(Math.sin(t), 3);
                    const heartY = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
                    tx = heartX * 8;
                    ty = -heartY * 8;
                } else if (type === 'star') {
                    // 星形烟花轨迹
                    angle = (Math.PI * 2 * i) / particles;
                    const radius = baseVelocity * (0.6 + Math.abs(Math.sin(5 * angle)) * 0.8);
                    tx = Math.cos(angle) * radius;
                    ty = Math.sin(angle) * radius;
                } else {
                    // 圆形烟花（默认）
                    angle = (Math.PI * 2 * i) / particles;
                    velocity = baseVelocity;
                    tx = Math.cos(angle) * velocity;
                    ty = Math.sin(angle) * velocity;
                }

                // 传递动画参数
                particle.style.setProperty('--tx', tx + 'px');
                particle.style.setProperty('--ty', ty + 'px');
                particle.style.setProperty('--gravity', gravity + 'px');
                particle.style.animation = `explode ${1.5 + Math.random() * 0.5}s ease-out forwards`;

                fireworksContainer.appendChild(particle);

                // 20%概率触发二次小爆炸
                if (Math.random() > 0.8 && type === 'circle') {
                    setTimeout(() => {
                        createMiniExplode(x + tx, y + ty + gravity, particleColor);
                    }, 600);
                }

                // 动画结束后清理DOM
                setTimeout(() => particle.remove(), 2000);
            }
        }

        // 二次小爆炸效果
        function createMiniExplode(x, y, color) {
            const miniParticles = 15;
            for (let i = 0; i < miniParticles; i++) {
                const miniParticle = document.createElement('div');
                miniParticle.className = 'firework';
                miniParticle.style.left = x + 'px';
                miniParticle.style.top = y + 'px';
                miniParticle.style.color = color;
                miniParticle.style.background = color;

                const angle = (Math.PI * 2 * i) / miniParticles;
                const velocity = 20 + Math.random() * 30;
                const tx = Math.cos(angle) * velocity;
                const ty = Math.sin(angle) * velocity;

                miniParticle.style.setProperty('--tx', tx + 'px');
                miniParticle.style.setProperty('--ty', ty + 'px');
                miniParticle.style.setProperty('--gravity', '20px');
                miniParticle.style.animation = `miniExplode 0.8s ease-out forwards`;

                fireworksContainer.appendChild(miniParticle);
                setTimeout(() => miniParticle.remove(), 800);
            }
        }

                // 为播放列表项添加点击事件监听器
                playlistItem.addEventListener('click', () => {
                    playMusic(index); // 点击时播放对应歌曲
                });

                // 将播放列表项添加到播放列表容器中
                playlist.appendChild(playlistItem);
            });
        }

        /**
         * 加载音乐函数
          * @param index
         */
        function loadMusic(index) {
            // 更新当前音乐索引
            currentMusicIndex = index;

            // 从播放列表中获取当前音乐数据
            const music = musicPlaylist[index];

            // 设置音频元素的源为当前音乐的URL
            bgMusic.src = music.src;

            // 更新UI显示当前音乐信息
            currentSongTitle.textContent = music.title; // 更新歌曲标题
            currentSongArtist.textContent = music.artist; // 更新艺术家信息

            // 更新播放列表激活项（高亮显示当前播放的歌曲）
            updateActivePlaylistItem();

            // 加载元数据后初始化进度条
            bgMusic.onloadedmetadata = initSongDuration;
        }

        /**
         * 播放音乐函数
          * @param index
         */
        function playMusic(index) {
            // 如果传入了索引且索引与当前索引不同，则加载该索引对应的音乐
            if (index !== undefined && index !== currentMusicIndex) {
                loadMusic(index);
            }

            // 播放音频
            bgMusic.play()
                .then(() => {
                    isPlaying = true; // 更新播放状态
                    updatePlayButton(); // 更新播放按钮图标
                })
                .catch(e => {
                    console.log("播放失败，可能需要用户交互:", e);
                    // 如果播放失败（通常是因为浏览器自动播放策略），提示用户
                    alert("请点击播放按钮开始播放音乐");
                });
        }

        /**
         * 暂停音乐函数
         */
        function pauseMusic() {
            bgMusic.pause(); // 暂停音频播放
            isPlaying = false; // 更新播放状态
            updatePlayButton(); // 更新播放按钮图标
        }

        /**
         * 切换播放/暂停状态函数
         */
        function togglePlayPause() {
            // 如果正在播放，则暂停；如果已暂停，则播放
            if (isPlaying) {
                pauseMusic();
            } else {
                playMusic();
            }
        }

        /**
         * 更新播放按钮状态函数
         */
        function updatePlayButton() {
            // 获取播放按钮中的图标元素
            const playIcon = playBtn.querySelector('i');

            // 根据播放状态更新图标和提示文本
            if (isPlaying) {
                playIcon.className = 'fas fa-pause'; // 播放状态显示暂停图标
                playBtn.title = "暂停"; // 更新提示文本
            } else {
                playIcon.className = 'fas fa-play'; // 暂停状态显示播放图标
                playBtn.title = "播放"; // 更新提示文本
            }
        }

        /**
         * 播放下一首函数
         */
        function playNext() {
            // 计算下一首的索引
            let nextIndex = currentMusicIndex + 1;

            // 如果已经到达列表末尾，回到第一首（实现循环播放）
            if (nextIndex >= musicPlaylist.length) {
                nextIndex = 0; // 重置索引为0，回到第一首
            }

            // 播放下一首音乐
            playMusic(nextIndex);
        }

        /**
         * 播放上一首函数
         */
        function playPrev() {
            // 计算上一首的索引
            let prevIndex = currentMusicIndex - 1;

            // 如果已经到达列表开头，跳到最后一首（实现循环播放）
            if (prevIndex < 0) {
                prevIndex = musicPlaylist.length - 1; // 设置为最后一首的索引
            }

            // 播放上一首音乐
            playMusic(prevIndex);
        }

        /**
         * 更新播放列表激活项函数
         */
        function updateActivePlaylistItem() {
            // 获取所有播放列表项
            const items = playlist.querySelectorAll('.playlist-item');

            // 遍历所有列表项，为当前播放的歌曲添加active类，移除其他的active类
            items.forEach((item, index) => {
                if (index === currentMusicIndex) {
                    item.classList.add('active'); // 当前播放的歌曲高亮显示
                } else {
                    item.classList.remove('active'); // 其他歌曲取消高亮
                }
            });
        }

        /**
         * 切换播放列表显示/隐藏函数
         */
        function togglePlaylist() {
            // 切换播放列表可见状态
            isPlaylistVisible = !isPlaylistVisible;

            // 根据状态更新播放列表容器的类名和切换按钮的图标/文本
            if (isPlaylistVisible) {
                playlist.classList.add('show'); // 显示播放列表
                playlistToggle.innerHTML = '<i class="fas fa-chevron-up"></i> 收起列表'; // 更新按钮文本和图标
            } else {
                playlist.classList.remove('show'); // 隐藏播放列表
                playlistToggle.innerHTML = '<i class="fas fa-list"></i> 播放列表'; // 恢复按钮原始文本和图标
            }
        }

        /**
         * 设置事件监听器函数
         */
        function setupMusicEventListeners() {
            // 播放/暂停按钮点击事件
            playBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                togglePlayPause();
            });

            // 上一首/下一首 按钮点击事件
            prevBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                playPrev();
            });

            nextBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                playNext();
            });

            // 播放列表切换按钮点击事件
            playlistToggle.addEventListener('click', function(e) {
                e.stopPropagation();
                togglePlaylist();
            });

            // 音频核心事件
            bgMusic.addEventListener('timeupdate', updateProgress);
            bgMusic.addEventListener('progress', updateBufferProgress);
            bgMusic.addEventListener('loadedmetadata', initSongDuration);
            // 音频播放结束事件 - 自动播放下一首
            bgMusic.addEventListener('ended', playNext);

            // 进度条点击跳转
            progressContainer.addEventListener('click', function(e) {
                e.stopPropagation();
                const rect = this.getBoundingClientRect();
                const clickX = e.clientX - rect.left;
                const percent = (clickX / rect.width) * 100;
                seekTo(percent);
            });

            // 进度条悬停时间预览
            progressContainer.addEventListener('mousemove', function(e) {
                e.stopPropagation();
                const rect = this.getBoundingClientRect();
                const hoverX = e.clientX - rect.left;
                const percent = (hoverX / rect.width) * 100;

                if (bgMusic.duration) {
                    const hoverTime = (percent / 100) * bgMusic.duration;
                    progressTooltip.textContent = formatTime(hoverTime);
                }
                progressTooltip.style.left = `${hoverX}px`;
            });

            // 进度条拖拽
            progressDot.addEventListener('mousedown', function(e) {
                e.stopPropagation();
                isDragging = true;
            });

            document.addEventListener('mousemove', function(e) {
                if (!isDragging) return;
                e.stopPropagation();
                const rect = progressContainer.getBoundingClientRect();
                const moveX = e.clientX - rect.left;
                const percent = (moveX / rect.width) * 100;

                progressPlayed.style.width = `${Math.max(0, Math.min(100, percent))}%`;
                progressDot.style.left = `${Math.max(0, Math.min(100, percent))}%`;
            });

            document.addEventListener('mouseup', function(e) {
                if (!isDragging) return;
                e.stopPropagation();
                isDragging = false;

                const rect = progressContainer.getBoundingClientRect();
                const endX = e.clientX - rect.left;
                const percent = (endX / rect.width) * 100;
                seekTo(percent);
            });

            // 通过时间更新事件检测播放结束
            bgMusic.addEventListener('timeupdate', function() {
                // 如果当前时间接近总时长（考虑微小误差），则播放下一首
                if(this.currentTime > 0 && this.duration > 0){
                    const remaining = this.duration - this.currentTime;
                    // 小于0.5秒时认为播放结束
                    if(remaining < 0.5 && !this.paused){
                        playNext();
                    }
                }
            });

            // 阻止音乐播放器卡片上的点击事件冒泡
            const musicPlayerCard = document.getElementById('musicPlayerCard');
            if (musicPlayerCard) {
                musicPlayerCard.addEventListener('click', function(e) {
                    e.stopPropagation();
                });
            }

            // // 键盘快捷键支持
            // document.addEventListener('keydown', (e) => {
            //     // 空格键切换播放/暂停（排除在输入框或文本区域中按空格的情况）
            //     if (e.code === 'Space' && !e.target.matches('input, textarea')) {
            //         e.preventDefault(); // 阻止空格键的默认行为（滚动页面）
            //         togglePlayPause(); // 切换播放/暂停
            //     }
            // });
        }

        // 页面加载完成后初始化音乐播放器
        // document.addEventListener('DOMContentLoaded', initMusicPlayer);

        // 绑定原有事件（按钮）
        // 1. 祝福相关（已通过 onclick 绑定，这里不需要重复绑定，防止冲突）
        // document.getElementById("surpriseBtn")?.addEventListener("click", showSurprise);

        // 2. 相册相关
        // document.querySelector(".album-button")?.addEventListener("click", showAlbum);
        // document.getElementById("backBtn")?.addEventListener("click", closeAlbum);
        // document.getElementById("viewerPrevBtn")?.addEventListener("click", prevImage);
        // document.getElementById("viewerNextBtn")?.addEventListener("click", nextImage);

        // 3. 音乐播放器相关（已在 initMusicPlayer 中绑定，这里不需要重复绑定）
        // document.getElementById("playPauseBtn")?.addEventListener("click", togglePlayPause);
        // document.getElementById("prevMusicBtn")?.addEventListener("click", playPrev);
        // document.getElementById("nextMusicBtn")?.addEventListener("click", playNext);
        // document.getElementById("togglePlaylistBtn")?.addEventListener("click", togglePlaylist);

        // 为验证码图片添加点击事件监听器（验证码图片点击刷新）
        // document.addEventListener('DOMContentLoaded', function() {
        //     const captchaImg = document.getElementById('captchaImg');
        //     if (captchaImg) {
        //         captchaImg.addEventListener('click', refreshCaptcha);
        //         console.log("验证码图片点击事件已绑定");
        //     }
        // });
    </script>

    <script>
        // 监听字体加载完成，彻底解决加载过程中的模糊闪烁
        document.fonts.ready.then(() => {
            document.documentElement.classList.add('fonts-loaded');
        });
